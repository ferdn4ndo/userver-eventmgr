# Eclipse Mosquitto 2.x — MQTT for Docker peers + WebSockets for browsers via nginx-proxy.
# nginx-proxy terminates TLS; clients use wss://<VIRTUAL_HOST>/ on port 443.

persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log

allow_anonymous false
password_file /mosquitto/config/pwfile

# Native MQTT: reachable on the Docker network (e.g. other stacks on nginx-proxy network).
# Not published to the host by default; add a ports: mapping in compose if you need LAN tools.
listener 1883
protocol mqtt

# MQTT over WebSockets (HTTP upgrade): this is what nginx-proxy proxies as http://container:9001
listener 9001
protocol websockets
