services:
  userver-mosquitto:
    container_name: "userver-mosquitto"
    image: "eclipse-mosquitto:alpine"
    restart: unless-stopped
    env_file:
      - "./mosquitto/.env"
    entrypoint:
      - "/bin/sh"
      - "/mosquitto/init/container-entrypoint.sh"
    command:
      - "/usr/sbin/mosquitto"
      - "-c"
      - "/mosquitto/config/mosquitto.conf"
    # Published only on the Docker network for nginx-proxy (wss on 443) and peer containers (mqtt on 1883).
    # Add host ports here if you need direct access during development, e.g. "1883:1883" or "9001:9001".
    volumes:
      - "./mosquitto/config:/mosquitto/config:rw"
      - "./mosquitto/data:/mosquitto/data:rw"
      - "./mosquitto/init:/mosquitto/init:ro"
      - "./mosquitto/log:/mosquitto/log:rw"
    expose:
      - 1883
      - 9001
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 1883 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  userver-rabbitmq:
    container_name: "userver-rabbitmq"
    hostname: rabbitmq
    image: "rabbitmq:4-management-alpine"
    restart: unless-stopped
    env_file:
      - "./rabbitmq/.env"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - "./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:rw"
      - "./rabbitmq/conf.d:/etc/rabbitmq/conf.d:rw"
      - "./rabbitmq/data:/data:rw"
    expose:
      - 5672
      - 15672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 50s

networks:
  default:
    name: "nginx-proxy"
    external: true
